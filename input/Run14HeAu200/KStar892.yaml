# This file contains all important information about K*(892) meson for its analysis in Run14HeAu200
---
status: resonance # required field for checking the file application
run_name: Run14HeAu200 # required field for searching for main.yaml
name: KStar892
name_tex: "K*(892)"
mass: 0.892
gamma: 0.0514
daughter1_id: 211
daughter2_id: -321
has_antiparticle: true
separate_antiparticle: false
branching_ratio: 0.66601
branching_ratio_uncertainty: 0.00009
use_emcal_id: true
cb_c_bins: 10 # number of centrality bins specified in CabanaBoy
cb_z_bins: 3 # number of z_{vtx} bins specified in CabanaBoy
cb_r_bins: 1 # number of reaction plane bins
m_inv_range_min: 0.75 # minimum value of a range of M_{inv} to be drawn
m_inv_range_max: 1.1 # maximum value of a range of M_{inv} to be drawn
sigmalized_yield_extraction_range: 1.5 # yield extraction range in +-(Gamma + sigma)*sigmalized_yield_extraction_range from mean
magnetic_field_configurations: # configurations of magnetic field in this run (empty if only one is used)
  - name: ''
pt_bins: # pT bins of invariant pT spectra, RAB, and RCP
  - {value: 1.00, min: 0.9, max: 1.1} # 0
  - {value: 1.25, min: 1.1, max: 1.4} # 1
  - {value: 1.55, min: 1.4, max: 1.7} # 2
  - {value: 1.80, min: 1.7, max: 1.9} # 3
  - {value: 2.00, min: 1.9, max: 2.1} # 4
  - {value: 2.20, min: 2.1, max: 2.3} # 5
  - {value: 2.45, min: 2.3, max: 2.6} # 6
  - {value: 2.75, min: 2.6, max: 2.9} # 7
  - {value: 3.15, min: 2.9, max: 3.4} # 8
  - {value: 3.70, min: 3.4, max: 4.0} # 9
  - {value: 4.25, min: 4.0, max: 4.5} # 10
  - {value: 4.75, min: 4.5, max: 5.0} # 11
  - {value: 5.75, min: 5.0, max: 6.5} # 12
  - {value: 7.50, min: 6.5, max: 8.5} # 13
sim_pt_ranges: # pT ranges of simulated particles (lpt - low pT, mpt - midrange pT, hpt - high pt)
  - name: lpt
  - name: mpt
  - name: hpt
pair_selection_methods:
- 
  name: NoPID
  bg_fit_func: pol3
  sigmalized_fit_range: 2. # fit range for approximation in +-(sigmalized_fit_range*(gamma + sigma)) from the mean
  centrality_bin_parameters:
    - {pt_bin_min: 4, pt_bin_max: 13} # 0-88
    - {pt_bin_min: 5, pt_bin_max: 13} # 0-20
    - {pt_bin_min: 5, pt_bin_max: 12} # 20-40
    - {pt_bin_min: 6, pt_bin_max: 12} # 40-60
    - {pt_bin_min: 6, pt_bin_max: 12} # 60-88
  color: "#7a21dd"
- 
  name: 1TOF1PID
  bg_fit_func: pol3
  sigmalized_fit_range: 2.5
  centrality_bin_parameters:
    - {pt_bin_min: 4, pt_bin_max: 10} # 0-88
    - {pt_bin_min: 4, pt_bin_max: 10} # 0-20
    - {pt_bin_min: 4, pt_bin_max: 9} # 20-40
    - {pt_bin_min: 4, pt_bin_max: 9} # 40-60
    - {pt_bin_min: 4, pt_bin_max: 9} # 60-88
  color: "#e42536"
- 
  name: TOF2PID
  bg_fit_func: pol2
  sigmalized_fit_range: 3.
  centrality_bin_parameters:
    - {pt_bin_min: 0, pt_bin_max: 10} # 0-88
    - {pt_bin_min: 0, pt_bin_max: 9} # 0-20
    - {pt_bin_min: 0, pt_bin_max: 9} # 20-40
    - {pt_bin_min: 0, pt_bin_max: 9} # 40-60
    - {pt_bin_min: 0, pt_bin_max: 4} # 60-88
  color: "#5790fc"
centrality_bins:
- 
  name: "0-88"
  name_tex: "0-88%"
  value_min: 0
  value_max: 88
  cb_c_min: 0 # CabanaBoy minimum c value
  cb_c_max: 8 # CabanaBoy maximum c value
  color: "#5790fc"
  marker_style: 47
  N_coll: 10.4
  N_coll_uncertainty: 0.7
  bias_factor: 0.89
  bias_factor_uncertainty: 0.01
  is_mb: true
